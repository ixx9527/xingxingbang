services:
  # 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xingxingbang-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web 管理后台
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: xingxingbang-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  default:
    name: xingxingbang-network