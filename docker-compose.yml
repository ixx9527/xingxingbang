version: '3.8'

services:
  # 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xingxingbang-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: 0.5

networks:
  default:
    name: xingxingbang-network